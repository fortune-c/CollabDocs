services:
  collabdocs:
    image: collabdocs
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - DefaultConnection=Host=db;Database=collabdocs;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - RedisConnection=redis:6379
  db:
    image: postgres
    restart: always
    # set shared memory limit when docker compose
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: collabdocs
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  redis:
    image: redis
    volumes: 
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    ports:
      - 6379:6379
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
  
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: always
